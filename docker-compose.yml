version: '3.8'

# MSC Label Maker — Docker Compose Configuration
# Supports both local development (docker compose up) and Portainer stack deployment.
#
# QUICK START (local):
#   cp stack.env.example .env
#   docker compose up --build
#
# PORTAINER SETUP:
#   1. Create a new Portainer stack from this Git repository
#   2. Set environment variables in the Portainer UI (Stack > Environment variables)
#   3. See stack.env.example for all available variables

services:
  msc-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: msc-label-maker-server:latest
    container_name: msc-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-5002}:5002"
    environment:
      - NODE_ENV=production
      - PORT=5002
    volumes:
      # Persist SQLite database between container restarts
      - msc-database:/app/data
    networks:
      - msc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  msc-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: msc-label-maker-client:latest
    container_name: msc-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      msc-server:
        condition: service_healthy
    networks:
      - msc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  msc-network:
    driver: bridge
    name: msc-network

volumes:
  msc-database:
    driver: local
    name: msc-database
